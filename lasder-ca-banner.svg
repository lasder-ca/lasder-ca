<!-- lasder-ca-banner.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240" role="img" aria-label="lasder-ca banner">
  <defs>
    <linearGradient id="nameGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0c27b"/>
      <stop offset="50%" stop-color="#f8f4ee"/>
      <stop offset="100%" stop-color="#7de2c3"/>
    </linearGradient>

    <style>
      .name {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 72px;
        font-weight: 800;
        letter-spacing: -2px;
        fill: url(#nameGradient);
        text-anchor: middle;
        text-rendering: geometricPrecision;
      }

      .sub {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 28px;
        font-weight: 500;
        fill: #d8d1c7;
        text-anchor: middle;
        text-rendering: geometricPrecision;
      }

      .small {
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.4px;
        fill: #8f877d;
        text-anchor: middle;
        text-rendering: geometricPrecision;
      }
    </style>
  </defs>

  <rect width="1200" height="240" rx="24" fill="#0a0a0a"/>
  <text x="600" y="92" class="name">lasder-ca</text>
  <text x="600" y="142" class="sub">Frontend Developer / Bug Hunter</text>
  <text x="600" y="178" class="small">lattee.jp · learning by making</text>
</svg>
