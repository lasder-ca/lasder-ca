<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">latte profile abstract header</title>
  <desc id="desc">Minimal abstract developer profile banner for latte.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08101d"/>
      <stop offset="55%" stop-color="#0b1424"/>
      <stop offset="100%" stop-color="#101827"/>
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d9b48a"/>
      <stop offset="100%" stop-color="#b98a5c"/>
    </linearGradient>

    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(915 190) rotate(90) scale(260 260)">
      <stop offset="0%" stop-color="#d3b18c" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d3b18c" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 495) rotate(90) scale(190 190)">
      <stop offset="0%" stop-color="#cbb7a0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#cbb7a0" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <pattern id="dotGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#d8c2ab" opacity="0.25"/>
    </pattern>

    <style>
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace; }
      .t0 { fill: #f7f4ef; }
      .t1 { fill: #98a7bf; }
      .t2 { fill: #d8b388; }
      .line { stroke: #cfa57b; stroke-opacity: 0.65; }
      .lineSoft { stroke: #8fa0b8; stroke-opacity: 0.25; }
      .shapeSoft { fill: #c7d1de; fill-opacity: 0.08; }
      .shapeStroke { stroke: #cfa57b; stroke-opacity: 0.65; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="700" rx="28" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="700" rx="28" fill="url(#glow1)"/>
  <rect x="0" y="0" width="1200" height="700" rx="28" fill="url(#glow2)"/>

  <!-- quiet background texture -->
  <g opacity="0.24">
    <rect x="976" y="70" width="96" height="96" fill="url(#dotGrid)"/>
    <rect x="880" y="510" width="120" height="72" fill="url(#dotGrid)"/>
    <rect x="88" y="470" width="72" height="72" fill="url(#dotGrid)"/>
  </g>

  <!-- abstract shapes -->
  <g>
    <circle cx="922" cy="184" r="145" class="shapeStroke" stroke-width="1.2"/>
    <circle cx="922" cy="184" r="18" fill="#d0aa80"/>
    <path d="M965 0C1034 67 1082 131 1082 221C1082 309 1045 352 996 395" class="lineSoft" stroke-width="1" />
    <path d="M0 613C67 627 125 653 125 700" class="shapeStroke" stroke-width="1.2"/>
    <path d="M458 498C633 498 714 533 788 639" class="shapeStroke" stroke-width="1.2"/>
    <path d="M1000 430C1090 442 1135 514 1135 610" class="shapeStroke" stroke-width="1.1"/>
    <rect x="886" y="449" width="188" height="132" class="shapeSoft"/>
    <path d="M1096 102V650" class="lineSoft" stroke-width="1"/>
    <path d="M100 140V620" class="lineSoft" stroke-width="1"/>
    <path d="M100 392H1110" class="lineSoft" stroke-width="1"/>
    <path d="M100 620H1110" class="lineSoft" stroke-width="1"/>
  </g>

  <!-- left accent -->
  <g>
    <path d="M102 96V336" class="line" stroke-width="3" stroke-linecap="round"/>
    <circle cx="102" cy="336" r="7.5" fill="#d0aa80"/>
  </g>

  <!-- title block -->
  <g transform="translate(145,108)">
    <text class="sans t2" x="0" y="0" font-size="24" font-weight="500" letter-spacing="7">HELLO, I’M</text>
    <text class="sans t0" x="0" y="122" font-size="108" font-weight="720" letter-spacing="-3">latte</text>
    <text class="mono t1" x="0" y="178" font-size="28">@lasder-ca</text>
    <text class="sans t2" x="0" y="246" font-size="22" font-weight="400" letter-spacing="1">web ・ backend ・ rust ・ security</text>
  </g>

  <!-- lower minimal section -->
  <g transform="translate(145,445)">
    <text class="sans t2" x="0" y="0" font-size="22" font-weight="500" letter-spacing="6">FEATURED</text>
    <text class="sans t0" x="0" y="82" font-size="68" font-weight="690" letter-spacing="-2">Lvau</text>
    <text class="sans t1" x="0" y="125" font-size="22">Local file encryption tool written in Rust.</text>
    <text class="mono t1" x="0" y="187" font-size="18">build ・ test ・ learn ・ improve</text>
  </g>

  <!-- bottom right -->
  <g transform="translate(916,552)">
    <circle cx="0" cy="0" r="18" fill="#d0aa80"/>
    <text class="mono t2" x="52" y="8" font-size="20" letter-spacing="1.5">lattee.jp</text>
  </g>

  <!-- fine line details -->
  <g>
    <path d="M100 392H358" class="line" stroke-width="1.4"/>
    <path d="M990 392H1068" class="line" stroke-width="1.4"/>
    <path d="M445 620H802" class="line" stroke-width="1.2"/>
    <rect x="806" y="612" width="12" height="12" stroke="#cfa57b" stroke-opacity="0.55"/>
  </g>
</svg>
