<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">LASDER 3D developer profile banner</title>
  <desc id="desc">An isometric 3D banner for a student developer working on security, AI agents, and systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1728"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#93c5fd"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse" patternTransform="skewX(-30)">
      <path d="M36 0H0V36" fill="none" stroke="#93c5fd" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000814" flood-opacity="0.55"/>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect x="1" y="1" width="1198" height="418" rx="30" fill="url(#bg)" stroke="#334155" stroke-opacity="0.75"/>
  <rect x="1" y="1" width="1198" height="418" rx="30" fill="url(#grid)"/>
  <ellipse cx="925" cy="200" rx="280" ry="210" fill="url(#glow)" filter="url(#soft)"/>

  <g transform="translate(88 76)">
    <rect x="0" y="0" width="520" height="34" rx="17" fill="#0f2236" stroke="#1e3a55"/>
    <circle cx="22" cy="17" r="5" fill="#22d3ee"/>
    <text x="40" y="22" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="2">PROFILE / LASDER-CA</text>

    <text x="0" y="106" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="82" font-weight="800" letter-spacing="-4">LASDER</text>
    <text x="3" y="145" fill="#67e8f9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700" letter-spacing="4">STUDENT DEVELOPER · JAPAN</text>
    <text x="3" y="193" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">Security tools, AI-agent infrastructure,</text>
    <text x="3" y="224" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">and systems that leave inspectable evidence.</text>

    <g transform="translate(0 260)" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700">
      <rect width="126" height="36" rx="10" fill="#10263a" stroke="#155e75"/>
      <text x="18" y="23" fill="#67e8f9">SECURITY</text>
      <rect x="140" width="132" height="36" rx="10" fill="#20183b" stroke="#6d28d9"/>
      <text x="158" y="23" fill="#c4b5fd">AI AGENTS</text>
      <rect x="286" width="118" height="36" rx="10" fill="#122344" stroke="#1d4ed8"/>
      <text x="304" y="23" fill="#93c5fd">SYSTEMS</text>
    </g>
  </g>

  <g transform="translate(725 72)" filter="url(#shadow)">
    <ellipse cx="186" cy="276" rx="210" ry="58" fill="#020617" fill-opacity="0.55"/>

    <g transform="translate(52 28)">
      <polygon points="128,0 256,66 128,132 0,66" fill="url(#cyan)"/>
      <polygon points="0,66 128,132 128,252 0,186" fill="#0e7490"/>
      <polygon points="256,66 128,132 128,252 256,186" fill="#155e75"/>
      <path d="M0 66L128 132L256 66M128 132V252" fill="none" stroke="#a5f3fc" stroke-opacity="0.35"/>
    </g>

    <g transform="translate(177 92)">
      <polygon points="82,0 164,42 82,84 0,42" fill="url(#violet)"/>
      <polygon points="0,42 82,84 82,164 0,122" fill="#6d28d9"/>
      <polygon points="164,42 82,84 82,164 164,122" fill="#5b21b6"/>
      <path d="M0 42L82 84L164 42M82 84V164" fill="none" stroke="#ede9fe" stroke-opacity="0.32"/>
    </g>

    <g transform="translate(0 154)">
      <polygon points="72,0 144,37 72,74 0,37" fill="url(#blue)"/>
      <polygon points="0,37 72,74 72,142 0,105" fill="#1d4ed8"/>
      <polygon points="144,37 72,74 72,142 144,105" fill="#1e40af"/>
      <path d="M0 37L72 74L144 37M72 74V142" fill="none" stroke="#dbeafe" stroke-opacity="0.3"/>
    </g>

    <g fill="#e2e8f0" opacity="0.78">
      <circle cx="40" cy="32" r="4"/>
      <circle cx="326" cy="58" r="3"/>
      <circle cx="363" cy="218" r="4"/>
      <circle cx="24" cy="268" r="3"/>
    </g>
    <g stroke="#67e8f9" stroke-width="1.5" stroke-opacity="0.45" fill="none">
      <path d="M42 32H110L150 70"/>
      <path d="M326 58H294L270 83"/>
      <path d="M363 218H316L284 192"/>
      <path d="M24 268H62L86 246"/>
    </g>
  </g>

  <text x="1128" y="385" text-anchor="end" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="2">BUILD / BREAK / VERIFY</text>
</svg>
