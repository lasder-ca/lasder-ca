<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">latte / lasder-ca</title>
  <desc id="desc">Profile banner for latte, focused on web, backend, Rust, and security.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#21180f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.20" r="0.78">
      <stop offset="0" stop-color="#f2c791" stop-opacity=".24"/>
      <stop offset=".62" stop-color="#b7793f" stop-opacity=".06"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cup" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6dfc4"/>
      <stop offset="1" stop-color="#c98e52"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity=".35"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#fff" stroke-opacity=".035"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#glow)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>

  <circle cx="1018" cy="72" r="112" fill="#e0a365" opacity=".08" filter="url(#blur)"/>
  <circle cx="1072" cy="302" r="150" fill="#916039" opacity=".10" filter="url(#blur)"/>

  <g transform="translate(88 72)">
    <rect x="0" y="0" width="8" height="216" rx="4" fill="#d7a66f"/>
    <text x="38" y="54" fill="#f9fafb" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="600" letter-spacing="3">HELLO, I'M</text>
    <text x="34" y="132" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="82" font-weight="760" letter-spacing="-3">latte</text>
    <text x="40" y="174" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24">@lasder-ca</text>
    <text x="40" y="218" fill="#e6d2bb" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="21">web · backend · rust · security</text>
  </g>

  <g transform="translate(870 76)" filter="url(#shadow)">
    <path d="M60 70c-15-18 14-27 1-45M101 68c-14-18 14-27 2-45M142 70c-15-18 14-27 1-45"
          fill="none" stroke="#f7e5d0" stroke-width="8" stroke-linecap="round" opacity=".72"/>
    <path d="M26 92h165v75c0 42-34 76-76 76H102c-42 0-76-34-76-76Z" fill="url(#cup)"/>
    <path d="M191 112h22c36 0 39 57 2 63h-25" fill="none" stroke="#d6a16a" stroke-width="18" stroke-linecap="round"/>
    <ellipse cx="108" cy="94" rx="82" ry="24" fill="#f3dcc1"/>
    <ellipse cx="108" cy="96" rx="65" ry="15" fill="#6c4128"/>
    <path d="M108 85c18 0 31 10 31 18s-13 17-31 17-31-9-31-17 13-18 31-18Z" fill="#b87b48" opacity=".38"/>
    <path d="M56 194c24 23 77 34 111 0" fill="none" stroke="#fff8ef" stroke-width="7" stroke-linecap="round" opacity=".38"/>
  </g>

  <g fill="#d7a66f">
    <circle cx="1125" cy="48" r="4"/>
    <circle cx="1150" cy="72" r="3" opacity=".65"/>
    <circle cx="820" cy="305" r="3" opacity=".6"/>
  </g>

  <text x="1120" y="324" text-anchor="end" fill="#8f9bad"
        font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
    small steps. real progress.
  </text>
</svg>
