name: Generate 3D contribution map

on:
  push:
    paths:
      - .github/workflows/profile-3d.yml
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-3d-contrib
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v5

      - name: Generate contribution artwork
        uses: yoshi389111/github-profile-3d-contrib@0.9.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit generated artwork
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib/

          if git diff --cached --quiet; then
            echo "No contribution artwork changes."
            exit 0
          fi

          git commit -m "chore(profile): refresh 3D contribution map"
          git push
